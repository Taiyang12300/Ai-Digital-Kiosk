<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Digital Kiosk - DLT (Local Brain)</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;500&family=Kanit:wght@300;500;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  
  <style>
    :root { --primary: #6c5ce7; --bg: #f9f9fb; --accent: #ff7675; }
    
    body { 
      font-family: 'Sarabun', sans-serif; 
      background: var(--bg); 
      margin: 0; 
      padding: 0; 
      display: flex; 
      justify-content: center; 
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* 🚩 แก้ไข: โหมดเริ่มต้นคือ No Scroll (พอดีจอ) */
    .main-container { 
      display: none; 
      width: 100%; 
      max-width: 500px; 
      height: 100dvh; 
      padding: 15px; 
      flex-direction: column; 
      align-items: center; 
      box-sizing: border-box;
      overflow-y: hidden; 
    }
    
    .top-controls { width: 100%; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; margin-bottom: 10px; }
    .lang-container { display: flex; gap: 10px; }
    .btn-lang, .btn-mute { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; border-radius: 25px; border: 2px solid #e0e0e0; background: white; color: #636e72; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .btn-lang img { width: 22px; height: auto; border-radius: 2px; }
    .btn-lang.active { border-color: var(--primary); background: #f0edff; color: var(--primary); font-weight: bold; }
    .btn-mute.muted { background: var(--accent); color: white; border-color: var(--accent); }

    .avatar-container { 
      width: 18vh; height: 18vh; 
      max-width: 150px; max-height: 150px;
      margin-bottom: 10px; border-radius: 50%; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); overflow: hidden; flex-shrink: 0;
    }
    #lottie-canvas { width: 100%; height: 100%; }

    /* 🚩 แก้ไข: กล่องข้อความแบบไม่ Scroll ในตัวเอง */
    .display-box { 
      background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); width: 100%; box-sizing: border-box; text-align: left; font-size: 18px; color: #2d3436; border-left: 6px solid var(--primary); line-height: 1.6;
      margin-bottom: 15px;
      flex-shrink: 0;
      overflow: visible;
    }
    
    /* 🚩 แก้ไข: ดันปุ่มกดและไมค์ลงล่างสุด */
    .bottom-group {
      width: 100%;
      margin-top: auto; 
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .faq-title { width: 100%; margin: 5px 0; font-weight: 500; color: #636e72; font-size: 15px; display: flex; align-items: center; gap: 8px; }
    .faq-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; margin-bottom: 15px; }
    .faq-btn { padding: 8px; background: white; color: var(--primary); border: 2px solid #e0e0ff; border-radius: 15px; font-size: 14px; cursor: pointer; transition: all 0.2s; font-weight: 500; min-height: 50px; display: flex; align-items: center; justify-content: center; text-align: center; }

    .input-section { width: 100%; display: flex; gap: 10px; margin-bottom: 10px; }
    #userInput { flex: 1; padding: 12px 15px; border-radius: 30px; border: 2px solid #ddd; outline: none; font-size: 16px; font-family: 'Sarabun'; }
    .btn-send { width: 45px; height: 45px; border-radius: 50%; border: none; background: var(--primary); color: white; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    .mic-section { margin-bottom: 10px; text-align: center; flex-shrink: 0; }
    .btn-mic { width: 75px; height: 75px; border-radius: 50%; border: none; background: var(--primary); color: white; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto; box-shadow: 0 8px 15px rgba(108,92,231,0.3); }
    .btn-mic.recording { background: var(--accent); animation: pulse 1.5s infinite; }

    /* 🚩 แก้ไข: ล็อคโลโก้ไม่ให้ล้น (แก้รูป 59412.jpg) */
    .splash-logo { 
      width: auto; 
      height: 120px; 
      max-width: 60%; 
      object-fit: contain; 
      margin-bottom: 30px; 
      filter: drop-shadow(0 0 20px rgba(33, 150, 243, 0.6)); 
    }

    #splash-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; transition: opacity 0.8s ease;
    }
    .splash-title { font-family: 'Kanit', sans-serif; color: white; font-size: 28px; font-weight: 800; margin-bottom: 5px; }
    .splash-status { font-family: 'Sarabun', sans-serif; color: #a0a0a0; font-size: 14px; margin-bottom: 25px; }
    .progress-container { width: 250px; height: 6px; background: #1a1a1a; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
    .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #2196F3, #00BCD4, #2196F3); background-size: 200% 100%; box-shadow: 0 0 15px rgba(33, 150, 243, 0.8); transition: width 0.4s ease; animation: flow 2s linear infinite; }
    @keyframes flow { 0% { background-position: 200% 0; } 100% { background-position: 0 0; } }

    /* สไตล์ตั๋วพิมพ์คงเดิม */
    @media print {
      body > *:not(#ticketLicenseWrapper) { display: none !important; }
      #ticketLicenseWrapper { display: block !important; position: absolute; top: 0; left: 0; width: 57mm; }
      .ticket { position: absolute; top: 0; left: 0; width: 57mm; padding-left: 5mm; padding-right: 2mm; box-sizing: border-box; }
    }
  </style>
</head>
<body>

  <div id="splash-screen">
    <img src="https://img2.pic.in.th/59407.png" class="splash-logo" alt="Logo">
    <div class="splash-title">น้องนำทาง</div>
    <div id="splash-status-text" class="splash-status">กำลังเริ่มต้นระบบ...</div>
    <div class="progress-container"><div id="splash-progress-bar" class="progress-fill"></div></div>
  </div>
  
  <div class="main-container" id="mainUI">
    <div class="top-controls">
      <button onclick="toggleMute()" id="muteBtn" class="btn-mute"><i id="muteIcon" class="fas fa-volume-up"></i></button>
      <div class="lang-container">
        <button onclick="changeLang('th')" id="btn-th" class="btn-lang active"><img src="https://flagcdn.com/w40/th.png"> TH</button>
        <button onclick="changeLang('en')" id="btn-en" class="btn-lang"><img src="https://flagcdn.com/w40/us.png"> EN</button>
      </div>
    </div>

    <div class="avatar-container">
      <lottie-player id="lottie-canvas" src="https://lottie.host/568e8594-a319-4491-bf10-a0f5c012fc76/6S3urqybG5.json" background="transparent" speed="1" loop autoplay></lottie-player>
    </div>

    <div class="display-box" id="response-text">(กำลังเตรียมระบบ AI...)</div>

    <div class="bottom-group">
        <div class="faq-title" id="faq-title-text"><i class="fas fa-star"></i> คำถามที่พบบ่อย:</div>
        <div id="faq-container" class="faq-grid"></div>

        <div class="input-section">
          <input type="text" id="userInput" placeholder="พิมพ์คำถามที่นี่..." onkeypress="handleKeyPress(event)">
          <button class="btn-send" onclick="handleManualInput()"><i class="fas fa-paper-plane"></i></button>
        </div>
        
        <div class="mic-section">
          <button id="micBtn" class="btn-mic" onclick="toggleListening()"><i class="fas fa-microphone"></i></button>
          <p id="statusText" style="margin-top:8px; color: #636e72; font-size: 13px;">แตะไมค์เพื่อเริ่มพูด</p>
        </div>
    </div>
  </div>

  <div id="ticketLicenseWrapper" style="display: none;">
    <div class="ticket">
      <div style="font-size: 15px; font-weight: bold;">🧾 ใบนำทางติดต่อราชการ</div>
      <div style="font-size: 11px; border-bottom: 1px dashed black; padding-bottom: 5px;">สำนักงานขนส่งอำเภอพยัคฆภูมิพิสัย</div>
      <div class="big" id="printLicenseType">-</div>
      <div id="printLicenseNote">-</div>
      <div style="text-align: left; margin: 10px 0 0 8px; font-size: 12px;">
        <b>เอกสารที่ต้องใช้:</b>
        <div id="printLicenseItems"></div>
      </div>
      <div style="border-top: 1px dashed black; padding-top: 5px; font-size: 10px; text-align: center;">
        <div id="printLicenseTime"></div>
        <div style="font-weight: bold; margin-top: 4px;">*ยื่นใบนี้พร้อมเอกสารที่งานใบอนุญาตขับรถชั้น 2*</div>
      </div>
    </div>
  </div>

  <audio id="queueSound" preload="auto">
    <source src="https://taiyang12300.github.io/sound/ยื่นใบนำทาง.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js?v=2.1"></script>

  <script>
    let recognition, isListening = false;
    const SpeechRecognition = window.SpeechRecognition || window.webkitRecognition;

    function showMainUI() {
        document.getElementById('splash-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('splash-screen').style.display = 'none';
            const main = document.getElementById('mainUI');
            main.style.display = 'flex';
        }, 800);
    }

    // 🚩 แก้ไข: ฟังก์ชันประมวลผลคำตอบที่จะเปลี่ยนโหมด Scroll อัตโนมัติ
    async function processQuery(query) {
      window.speechSynthesis.cancel();
      const respBox = document.getElementById('response-text');
      const container = document.getElementById('mainUI');
      
      respBox.innerText = (window.currentLang === 'th') ? "กำลังค้นหา..." : "Searching...";
      
      if (typeof getResponse === "function") {
          await getResponse(query);
          
          // ตรวจสอบความสูงเนื้อหาหลังจาก AI ตอบแล้ว
          setTimeout(() => {
              const contentHeight = container.scrollHeight;
              const viewHeight = window.innerHeight;
              
              if (contentHeight > viewHeight) {
                  // ถ้าเนื้อหา "ยาว" ให้เลื่อนได้ทั้งหน้า (Page Scroll)
                  container.style.height = 'auto';
                  container.style.overflowY = 'visible';
                  document.body.style.overflowY = 'auto';
              } else {
                  // ถ้าเนื้อหา "สั้น" หรือหน้าแรก ให้ล็อคพอดีจอ (No Scroll)
                  container.style.height = '100dvh';
                  container.style.overflowY = 'hidden';
                  document.body.style.overflowY = 'hidden';
                  window.scrollTo(0, 0);
              }
          }, 200);
      }
    }

    // Logic ไมค์และปุ่มอื่นๆ (เหมือนเดิมที่คุณต้องการ)
    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = 'th-TH';
      recognition.continuous = true; 
      recognition.interimResults = true; 

      recognition.onstart = () => { 
          window.isListening = true;
          document.getElementById('micBtn').classList.add('recording'); 
          document.getElementById('statusText').innerText = (window.currentLang === 'th') ? "กำลังฟัง..." : "Listening...";
      };

      recognition.onresult = (e) => {
          if (window.micTimer) clearTimeout(window.micTimer);
          let transcript = "";
          for (let i = e.resultIndex; i < e.results.length; ++i) {
              transcript += e.results[i][0].transcript;
          }
          if (transcript.trim() !== "") {
              document.getElementById('userInput').value = transcript;
              window.micTimer = setTimeout(() => {
                  processQuery(transcript);
                  recognition.stop(); 
              }, 2000); 
          }
      };

      recognition.onend = () => { 
          window.isListening = false;
          stopListening(); 
          if (typeof startWakeWord === "function" && !window.isBusy) startWakeWord();
      };

      recognition.onerror = (e) => { stopListening(); };
    }

    function toggleMute() {
      window.isMuted = !window.isMuted;
      const muteBtn = document.getElementById('muteBtn');
      const muteIcon = document.getElementById('muteIcon');
      if (window.isMuted) {
        window.speechSynthesis.cancel();
        muteBtn.classList.add('muted');
        muteIcon.className = 'fas fa-volume-mute';
      } else {
        muteBtn.classList.remove('muted');
        muteIcon.className = 'fas fa-volume-up';
      }
    }

    function changeLang(lang) {
      window.speechSynthesis.cancel();
      window.isBusy = false;
      window.currentLang = lang;
      window.isMuted = false;
      document.getElementById('btn-th').classList.toggle('active', lang === 'th');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      const isTh = (lang === 'th');
      document.getElementById('userInput').placeholder = isTh ? "พิมพ์คำถามที่นี่..." : "Type your question here...";
      document.getElementById('statusText').innerText = isTh ? "แตะไมค์เพื่อเริ่มพูด" : "Tap mic to speak";
      document.getElementById('response-text').innerText = isTh ? "เปลี่ยนเป็นภาษาไทยแล้วครับ" : "Switched to English.";
      if (recognition) recognition.lang = isTh ? 'th-TH' : 'en-US';
      if (typeof renderFAQButtons === "function") renderFAQButtons();
      // รีเซ็ต Layout เมื่อเปลี่ยนภาษา
      const container = document.getElementById('mainUI');
      container.style.height = '100dvh';
      container.style.overflowY = 'hidden';
      document.body.style.overflowY = 'hidden';
    }

    function handleManualInput() {
      const input = document.getElementById('userInput');
      if (input.value.trim()) { processQuery(input.value.trim()); input.value = ''; }
    }
    function handleKeyPress(e) { if (e.key === 'Enter') handleManualInput(); }

    function toggleListening() { 
      if (window.isBusy) return;
      if (window.isListening) { 
        recognition.stop(); 
      } else { 
        if (typeof forceStopAllMic === "function") forceStopAllMic();
        window.speechSynthesis.cancel(); 
        recognition.start(); 
      } 
    }

    function stopListening() { 
      window.isListening = false;
      document.getElementById('micBtn').classList.remove('recording'); 
      document.getElementById('statusText').innerText = (window.currentLang === 'th') ? "แตะไมค์เพื่อเริ่มพูด" : "Tap mic to speak";
    }

    function printLicenseNote(type, note, items) {
      const now = new Date();
      document.getElementById('printLicenseType').innerText = type;
      document.getElementById('printLicenseNote').innerText = note;
      document.getElementById('printLicenseTime').innerText = `เวลาพิมพ์: ${now.toLocaleString('th-TH')}`;
      const docArray = items.includes('\\n') ? items.split('\\n') : items.split('\n');
      const itemsHTML = docArray
        .filter(i => i.trim() !== "")
        .map(i => `<div style="text-align: left !important; font-weight: 900 !important; color: #000 !important; margin-bottom: 3px;">[ ✓ ] ${i.trim()}</div>`)
        .join('');
      document.getElementById('printLicenseItems').innerHTML = itemsHTML;
      const audio = document.getElementById('queueSound');
      if (audio) { audio.currentTime = 0; audio.play().catch(e => {}); }
      const wrapper = document.getElementById('ticketLicenseWrapper');
      wrapper.style.display = 'block';
      setTimeout(() => {
        window.print();
        setTimeout(() => {
          wrapper.style.display = 'none';
          if(typeof renderFAQButtons === "function") renderFAQButtons(); 
        }, 500);
      }, 300);
    }
  </script>
</body>
</html>
