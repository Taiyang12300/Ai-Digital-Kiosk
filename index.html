<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Digital Kiosk - DLT (Local Brain)</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;500&family=Kanit:wght@300;500;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  

  <style>
    :root { --primary: #6c5ce7; --bg: #f9f9fb; --accent: #ff7675; }
    
    body { 
      font-family: 'Sarabun', sans-serif; 
      background: var(--bg); 
      margin: 0; 
      padding: 0; 
      display: flex; 
      justify-content: center; 
      min-height: 100vh;
    }

    .main-container { width: 100%; max-width: 600px; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    
    /* --- UI Components --- */
    .top-controls { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .lang-container { display: flex; gap: 10px; }
    .btn-lang, .btn-mute { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; border-radius: 25px; border: 2px solid #e0e0e0; background: white; color: #636e72; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .btn-lang img { width: 22px; height: auto; border-radius: 2px; }
    .btn-lang.active { border-color: var(--primary); background: #f0edff; color: var(--primary); font-weight: bold; }
    .btn-mute.muted { background: var(--accent); color: white; border-color: var(--accent); }

    .avatar-container { width: 180px; height: 180px; margin-bottom: 20px; border-radius: 50%; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); overflow: hidden; }
    #lottie-canvas { width: 100%; height: 100%; }

    .display-box { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); width: 100%; box-sizing: border-box; text-align: left; min-height: 140px; font-size: 18px; margin-bottom: 20px; color: #2d3436; border-left: 6px solid var(--primary); line-height: 1.6; }
    
    .faq-title { width: 100%; margin: 10px 0; font-weight: 500; color: #636e72; font-size: 16px; display: flex; align-items: center; gap: 8px; }
    .faq-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; width: 100%; margin-bottom: 30px; }
    .faq-btn { padding: 12px; background: white; color: var(--primary); border: 2px solid #e0e0ff; border-radius: 15px; font-size: 15px; cursor: pointer; transition: all 0.2s; font-weight: 500; min-height: 60px; display: flex; align-items: center; justify-content: center; text-align: center; }
    .faq-btn:active { transform: scale(0.95); background: var(--primary); color: white; }

    .input-section { width: 100%; display: flex; gap: 10px; margin-bottom: 20px; }
    #userInput { flex: 1; padding: 15px; border-radius: 30px; border: 2px solid #ddd; outline: none; font-size: 16px; font-family: 'Sarabun'; }
    .btn-send { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--primary); color: white; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    .mic-section { margin-bottom: 30px; text-align: center; }
    .btn-mic { width: 90px; height: 90px; border-radius: 50%; border: none; background: var(--primary); color: white; font-size: 35px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto; box-shadow: 0 10px 20px rgba(108,92,231,0.3); }
    .btn-mic.recording { background: var(--accent); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }

    /* --- [ใหม่] ระบบ Checklist --- */
    .checklist-card { text-align: left; background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; }
    .check-item { display: flex; align-items: center; margin-bottom: 12px; background: #f0f2f5; padding: 10px; border-radius: 8px; cursor: pointer; }
    .check-item input { width: 22px; height: 22px; cursor: pointer; accent-color: #28a745; }
    .check-item label { margin-left: 12px; font-size: 18px; cursor: pointer; color: #333; flex: 1; }

    /* --- [ใหม่] ปุ่มปริ้นในหน้าจอ --- */
    #btnPrintGuide { 
        display: none !important; 
        width: 100%; padding: 15px; background: #28a745; color: white; 
        border: none; border-radius: 10px; font-weight: bold; 
        font-size: 20px; cursor: pointer; margin-top: 15px; 
    }
    #btnPrintGuide.show-btn { display: block !important; }

    /* --- ระบบพิมพ์ (Ticket 57mm/58mm) ปรับปรุงกันตกขอบ --- */
.ticket { 
    background: white; 
    color: #000 !important; 
    /* ปรับเหลือ 52mm เพื่อให้มีช่องว่างขอบขวา และกัน Browser คำนวณพลาด */
    width: 52mm; 
    padding: 5px 2px 5px 8px; /* เพิ่ม padding-left (8px) เพื่อดันเนื้อหาไปทางขวา */
    margin: 0 auto; 
    font-family: 'Kanit', sans-serif; 
    text-align: center;
    box-sizing: border-box; /* สำคัญมาก: เพื่อให้ padding ไม่ไปเพิ่มความกว้าง 52mm */
}

/* บังคับทุกส่วนในตั๋วให้เข้มดำสนิท */
.ticket * { 
    font-weight: 900 !important; 
    color: #000 !important;
}

.ticket .big { 
    font-size: 24px; /* ลดขนาดลงนิดนึงกันล้นบรรทัด */
    margin: 8px 0; 
    line-height: 1.1;
    display: block;
    text-align: center;
}

#printLicenseNote {
    background: transparent !important; 
    color: #000 !important; 
    border: 1px dashed #000; 
    padding: 6px 4px;
    font-weight: 900 !important; 
    font-size: 14px; 
    margin: 5px 2mm; /* เพิ่ม margin ซ้ายขวา 2mm เพื่อหลบขอบ */
    text-align: center !important;
    display: block;
    width: auto; /* เปลี่ยนจาก 100% เป็น auto เพื่อให้เคารพ margin */
    box-sizing: border-box;
    word-wrap: break-word;
    line-height: 1.2;
}

#printLicenseItems {
    margin: 10px 0 10px 5px; /* ลด margin-left ลงนิดนึง */
    font-size: 12px; 
    line-height: 1.4;
    display: block;
    text-align: left !important;
}

@media print {
  body > *:not(#ticketLicenseWrapper) { display: none !important; }
  #ticketLicenseWrapper { display: block !important; position: absolute; top: 0; left: 0; width: 57mm; }
  #ticketLicenseWrapper.printing, #ticketLicenseWrapper.printing * { 
      visibility: visible !important; 
      display: block !important; 
  }

  .ticket { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 57mm; /* ขนาดกระดาษจริง */
      padding-left: 5mm; /* 💡 จุดตาย: ดันเนื้อหาทั้งหมดออกจากขอบซ้าย 5 มม. */
      padding-right: 2mm;
      margin: 0; 
      box-sizing: border-box;
  }
}

    /* --- Splash Screen UI --- */
#splash-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-color: #000; /* พื้นหลังสีดำสนิท */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10000; /* อยู่เหนือทุกอย่าง */
    transition: opacity 0.8s ease;
}

.splash-logo {
    width: 180px;
    margin-bottom: 30px;
    /* เอฟเฟกต์เรืองแสง (Glow) */
    filter: drop-shadow(0 0 20px rgba(33, 150, 243, 0.6));
}

.splash-title {
    font-family: 'Kanit', sans-serif;
    color: white;
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 5px;
}

.splash-status {
    font-family: 'Sarabun', sans-serif;
    color: #a0a0a0;
    font-size: 14px;
    margin-bottom: 25px;
}

.progress-container {
    width: 250px;
    height: 6px;
    background: #1a1a1a;
    border-radius: 10px;
    border: 1px solid #333;
    overflow: hidden;
}

.progress-fill {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #2196F3, #00BCD4, #2196F3);
    background-size: 200% 100%;
    box-shadow: 0 0 15px rgba(33, 150, 243, 0.8);
    transition: width 0.4s ease;
    animation: flow 2s linear infinite;
}

@keyframes flow {
    0% { background-position: 200% 0; }
    100% { background-position: 0 0; }
}
    
  </style>
</head>
<body>

  <div id="splash-screen">
    <img src="https://img2.pic.in.th/59407.png" class="splash-logo" alt="Logo">
    
    <div class="splash-title">น้องนำทาง</div>
    <div id="splash-status-text" class="splash-status">กำลังเริ่มต้นระบบ... (Initializing Database...)</div>
    
    <div class="progress-container">
        <div id="splash-progress-bar" class="progress-fill"></div>
    </div>
  </div>
  
  
  <div class="main-container">
    <div class="top-controls">
      <button onclick="toggleMute()" id="muteBtn" class="btn-mute"><i id="muteIcon" class="fas fa-volume-up"></i></button>
      <div class="lang-container">
        <button onclick="changeLang('th')" id="btn-th" class="btn-lang active"><img src="https://flagcdn.com/w40/th.png"> TH</button>
        <button onclick="changeLang('en')" id="btn-en" class="btn-lang"><img src="https://flagcdn.com/w40/us.png"> EN</button>
      </div>
    </div>

    <div class="avatar-container">
      <lottie-player id="lottie-canvas" src="https://lottie.host/568e8594-a319-4491-bf10-a0f5c012fc76/6S3urqybG5.json" background="transparent" speed="1" loop autoplay></lottie-player>
    </div>

    <div class="display-box" id="response-text">(กำลังเตรียมระบบ AI...)</div>

    <div class="faq-title" id="faq-title-text"><i class="fas fa-star"></i> คำถามที่พบบ่อย:</div>
    <div id="faq-container" class="faq-grid"></div>

    <div class="input-section">
      <input type="text" id="userInput" placeholder="พิมพ์คำถามที่นี่..." onkeypress="handleKeyPress(event)">
      <button class="btn-send" onclick="handleManualInput()"><i class="fas fa-paper-plane"></i></button>
    </div>
    
    <div class="mic-section">
      <button id="micBtn" class="btn-mic" onclick="toggleListening()"><i class="fas fa-microphone"></i></button>
      <p id="statusText" style="margin-top:10px; color: #636e72; font-size: 14px;">แตะไมค์เพื่อเริ่มพูด</p>
    </div>
  </div>

  <div id="ticketLicenseWrapper" style="display: none;">
    <div class="ticket">
      <div style="font-size: 15px; font-weight: bold;">🧾 ใบนำทางติดต่อราชการ</div>
      <div style="font-size: 11px; border-bottom: 1px dashed black; padding-bottom: 5px;">สำนักงานขนส่งอำเภอพยัคฆภูมิพิสัย</div>
      <div class="big" id="printLicenseType">-</div>
      <div id="printLicenseNote">-</div>
      <div style="text-align: left; margin: 10px 0 0 8px; font-size: 12px;">
        <b>เอกสารที่ต้องใช้:</b>
        <div id="printLicenseItems"></div>
      </div>
      <div style="border-top: 1px dashed black; padding-top: 5px; font-size: 10px; text-align: center;">
        <div id="printLicenseTime"></div>
        <div style="font-weight: bold; margin-top: 4px;">*ยื่นใบนี้พร้อมเอกสารที่งานใบอนุญาตขับรถชั้น 2*</div>
      </div>
    </div>
  </div>

  <audio id="queueSound" preload="auto">
    <source src="https://taiyang12300.github.io/sound/ยื่นใบนำทาง.mp3" type="audio/mpeg">
  </audio>

  <video id="video" width="640" height="480" autoplay muted playsinline style="display:none;"></video>
  
  <script src="script.js?v=2.1"></script>

  <script>
    let recognition, isListening = false;
    const SpeechRecognition = window.SpeechRecognition || window.webkitRecognition;

    function toggleMute() {
      window.isMuted = !window.isMuted;
      const muteBtn = document.getElementById('muteBtn');
      const muteIcon = document.getElementById('muteIcon');
      if (window.isMuted) {
        window.speechSynthesis.cancel();
        muteBtn.classList.add('muted');
        muteIcon.className = 'fas fa-volume-mute';
      } else {
        muteBtn.classList.remove('muted');
        muteIcon.className = 'fas fa-volume-up';
      }
    }

    function changeLang(lang) {
      window.speechSynthesis.cancel();
      window.isBusy = false;
      window.currentLang = lang;
      window.isMuted = false;
      document.getElementById('btn-th').classList.toggle('active', lang === 'th');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      const isTh = (lang === 'th');
      document.getElementById('userInput').placeholder = isTh ? "พิมพ์คำถามที่นี่..." : "Type your question here...";
      document.getElementById('statusText').innerText = isTh ? "แตะไมค์เพื่อเริ่มพูด" : "Tap mic to speak";
      document.getElementById('response-text').innerText = isTh ? "เปลี่ยนเป็นภาษาไทยแล้วครับ" : "Switched to English.";
      if (recognition) recognition.lang = isTh ? 'th-TH' : 'en-US';
      if (typeof renderFAQButtons === "function") renderFAQButtons();
    }

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = 'th-TH';
      // 🚩 แก้ไข: ตั้งค่าให้ฟังต่อเนื่องและแสดงผลระหว่างพูด
      recognition.continuous = true; 
      recognition.interimResults = true; 

      recognition.onstart = () => { 
          window.isListening = true;
          document.getElementById('micBtn').classList.add('recording'); 
          document.getElementById('statusText').innerText = (window.currentLang === 'th') ? "กำลังฟัง..." : "Listening...";
      };

      recognition.onresult = (e) => {
          // 🚩 แก้ไข: ระบบ Reset Timer เมื่อยังมีเสียงพูดเข้ามา
          if (window.micTimer) clearTimeout(window.micTimer);

          let transcript = "";
          for (let i = e.resultIndex; i < e.results.length; ++i) {
              transcript += e.results[i][0].transcript;
          }

          if (transcript.trim() !== "") {
              document.getElementById('userInput').value = transcript;
              
              // 🚩 แก้ไข: หน่วงเวลา 2 วินาทีหลังจากหยุดพูด ก่อนจะประมวลผลคำตอบ
              window.micTimer = setTimeout(() => {
                  processQuery(transcript);
                  recognition.stop(); 
              }, 2000); 
          }
      };

      recognition.onend = () => { 
          window.isListening = false;
          stopListening(); 
          // 🚩 แก้ไข: เมื่อไมค์ปิด ให้กลับไป Stand-by Wake Word
          if (typeof startWakeWord === "function" && !window.isBusy) startWakeWord();
      };

      recognition.onerror = (e) => {
          if (e.error === 'no-speech') return; // 🚩 แก้ไข: ถ้าเงียบไม่ต้องสั่งหยุด ให้ continuous ทำงานต่อ
          console.error("Mic Error:", e.error);
          stopListening();
      };
    }

    function handleManualInput() {
      const input = document.getElementById('userInput');
      if (input.value.trim()) { processQuery(input.value.trim()); input.value = ''; }
    }
    function handleKeyPress(e) { if (e.key === 'Enter') handleManualInput(); }

    async function processQuery(query) {
      window.speechSynthesis.cancel();
      document.getElementById('response-text').innerText = (window.currentLang === 'th') ? "กำลังค้นหา..." : "Searching...";
      if (typeof getResponse === "function") await getResponse(query);
    }

    function toggleListening() { 
      if (window.isBusy) return; // 🚩 แก้ไข: ห้ามเปิดไมค์ถ้าหุ่นยนต์กำลังพูด
      if (window.isListening) { 
        recognition.stop(); 
      } else { 
        if (typeof forceStopAllMic === "function") forceStopAllMic(); // 🚩 แก้ไข: ล้างสถานะไมค์ตัวอื่นก่อนเริ่ม
        window.speechSynthesis.cancel(); 
        recognition.start(); 
      } 
    }

    function stopListening() { 
      window.isListening = false;
      document.getElementById('micBtn').classList.remove('recording'); 
      document.getElementById('statusText').innerText = (window.currentLang === 'th') ? "แตะไมค์เพื่อเริ่มพูด" : "Tap mic to speak";
    }

    // --- [ ฟังก์ชันพิมพ์ใบนำทาง - แก้ไขให้เข้มและตัวหนาพิเศษ ] ---
    function printLicenseNote(type, note, items) {
      const now = new Date();
      document.getElementById('printLicenseType').innerText = type;
      document.getElementById('printLicenseNote').innerText = note;
      document.getElementById('printLicenseTime').innerText = `เวลาพิมพ์: ${now.toLocaleString('th-TH')}`;
      
      const docArray = items.includes('\\n') ? items.split('\\n') : items.split('\n');
      
      const itemsHTML = docArray
        .filter(i => i.trim() !== "")
        .map(i => `<div style="text-align: left !important; font-weight: 900 !important; color: #000 !important; margin-bottom: 3px;">[ ✓ ] ${i.trim()}</div>`)
        .join('');
        
      document.getElementById('printLicenseItems').innerHTML = itemsHTML;

      const audio = document.getElementById('queueSound');
      if (audio) { audio.currentTime = 0; audio.play().catch(e => {}); }

      const wrapper = document.getElementById('ticketLicenseWrapper');
      wrapper.style.display = 'block';
      wrapper.classList.add('printing');

      setTimeout(() => {
        window.print();
        setTimeout(() => {
          wrapper.classList.remove('printing');
          wrapper.style.display = 'none';
          if(typeof renderFAQButtons === "function") renderFAQButtons(); 
        }, 500);
      }, 300);
    }
  </script>
</body>
</html>
