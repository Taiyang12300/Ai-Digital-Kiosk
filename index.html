<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>AI Digital Kiosk - DLT (Local Brain)</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;500&family=Kanit:wght@300;500;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  <link rel="icon" type="image/png" href="https://img2.pic.in.th/59424.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6c5ce7">
  
  <style>
    :root { 
      --primary: #6c5ce7; 
      --bg: #f9f9fb; 
      --accent: #ff7675; 
      /* กำหนดค่ากลางสำหรับ Scale ตัวอักษรและระยะห่าง */
      --base-font: clamp(16px, 2vw, 20px);
    }
    
    body { 
      font-family: 'Sarabun', sans-serif; 
      background: var(--bg); 
      margin: 0; 
      padding: 0; 
      display: flex; 
      justify-content: center; 
      min-height: 100dvh;
      touch-action: pan-y;
      -webkit-text-size-adjust: none;
    }

    .main-container { 
  width: 100%; 
  max-width: clamp(350px, 90%, 800px); 
  padding: clamp(15px, 3vw, 30px); 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  box-sizing: border-box;
  /* แก้ไขส่วนนี้ */
  min-height: 100dvh; 
  position: relative;
}
    
    /* --- UI Components (Responsive Scaling) --- */
    .top-controls { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2dvh; }
    .lang-container { display: flex; gap: 10px; }
    
    .btn-lang, .btn-mute { 
      display: flex; align-items: center; justify-content: center; gap: 8px; 
      padding: clamp(8px, 1.5vw, 14px) clamp(12px, 2vw, 20px); 
      border-radius: 25px; border: 2px solid #e0e0e0; background: white; color: #636e72; 
      cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      font-size: clamp(14px, 1.5vw, 18px);
    }
    .btn-lang.active { border-color: var(--primary); background: #f0edff; color: var(--primary); font-weight: bold; }
    .btn-mute.muted { background: var(--accent); color: white; border-color: var(--accent); }

    /* 🤖 ปรับขนาดหุ่นยนต์ตามความสูงจอ (dvh) เพื่อให้เหลือพื้นที่ด้านล่าง */
    .avatar-container { 
      width: clamp(130px, 22dvh, 220px); 
      height: clamp(130px, 22dvh, 220px); 
      margin-bottom: 2dvh; 
      border-radius: 50%; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
      overflow: hidden; flex-shrink: 0; 
    }
    #lottie-canvas { width: 100%; height: 100%; }

    /* 📝 กล่องข้อความปรับขนาด Font ตามความกว้างหน้าจอ */
    .display-box { 
      background: white; border-radius: 20px; 
      padding: clamp(18px, 3vw, 30px); 
      box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
      width: 100%; box-sizing: border-box; text-align: left; 
      min-height: 120px; 
      font-size: clamp(17px, 2.2vw, 24px); 
      margin-bottom: 20px; color: #2d3436; 
      border-left: clamp(4px, 1vw, 8px) solid var(--primary); 
      line-height: 1.6; 
    }
    
    .faq-title { width: 100%; margin: 10px 0; font-weight: 800; color: #2d3436; font-size: clamp(18px, 2.5vw, 20px); display: flex; align-items: center; gap: 8px; }
    .faq-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(clamp(130px, 20vw, 180px), 1fr)); 
      gap: 12px; width: 100%; margin-bottom: 20px; 
    }
    
    .faq-btn { 
      padding: 12px; background: white; color: var(--primary); border: 2px solid #e0e0ff; border-radius: 15px; 
      font-size: clamp(13px, 1.4vw, 17px); 
      cursor: pointer; transition: all 0.2s; font-weight: 500; 
      min-height: clamp(50px, 8dvh, 70px); 
      display: flex; align-items: center; justify-content: center; text-align: center; 
    }
    .faq-btn:active { transform: scale(0.95); background: var(--primary); color: white; }

    .input-section { width: 100%; display: flex; gap: 10px; margin-bottom: 20px; }
    #userInput { 
      flex: 1; padding: 15px 20px; border-radius: 30px; border: 2px solid #ddd; outline: none; 
      font-size: clamp(15px, 1.5vw, 18px); font-family: 'Sarabun'; 
    }
    .btn-send { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--primary); color: white; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    /* 🎙️ แก้ไข 4: ระบบ Flexible Sticky (รองรับทุกขนาดจอ) */
    .mic-section { 
  /* ลบ position: fixed หรือ sticky ออกให้หมด */
  width: 100%;
  padding: 20px 0;
  text-align: center; 
  z-index: 999;
  
  /* เพิ่มส่วนนี้ */
  margin-top: auto;   /* ถ้าเนื้อหาสั้น มันจะต่อท้ายทันที ถ้าเนื้อหายาวมันจะถูกดันลงล่างสุด */
  flex-shrink: 0;     /* ป้องกันปุ่มโดนบีบแบน */
  position: relative;
  bottom: 0;
}

.btn-mic { 
  width: clamp(90px, 12dvh, 110px); 
  height: clamp(90px, 12dvh, 110px); 
  border-radius: 50%; 
  border: none; 
  background: var(--primary); 
  color: white; 
  font-size: clamp(35px, 4vw, 45px); 
  cursor: pointer; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  margin: 0 auto; 
  box-shadow: 0 10px 20px rgba(108,92,231,0.3); 
}
    .btn-mic.recording { background: var(--accent); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }

    /* --- [ส่วนอื่นๆ คงเดิม] --- */
    .checklist-card { text-align: left; background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; }
    .check-item { display: flex; align-items: center; margin-bottom: 12px; background: #f0f2f5; padding: 10px; border-radius: 8px; cursor: pointer; }
    .check-item input { width: 22px; height: 22px; cursor: pointer; accent-color: #28a745; }
    .check-item label { margin-left: 12px; font-size: 18px; cursor: pointer; color: #333; flex: 1; }
    #btnPrintGuide { display: none !important; width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 20px; cursor: pointer; margin-top: 15px; }
    #btnPrintGuide.show-btn { display: block !important; }
    
    /* Ticket Print Section */
    .ticket { background: white; color: #000 !important; width: 52mm; padding: 5px 2px 5px 8px; margin: 0 auto; font-family: 'Kanit', sans-serif; text-align: center; box-sizing: border-box; }
    .ticket * { font-weight: 900 !important; color: #000 !important; }
    .ticket .big { font-size: 24px; margin: 8px 0; line-height: 1.1; display: block; text-align: center; }
    #printLicenseNote { background: transparent !important; color: #000 !important; border: 1px dashed #000; padding: 6px 4px; font-weight: 900 !important; font-size: 14px; margin: 5px 2mm; text-align: center !important; display: block; width: auto; box-sizing: border-box; word-wrap: break-word; line-height: 1.2; }
    #printLicenseItems { margin: 10px 0 10px 5px; font-size: 12px; line-height: 1.4; display: block; text-align: left !important; }
    
    @media print { 
      body > *:not(#ticketLicenseWrapper) { display: none !important; } 
      #ticketLicenseWrapper { display: block !important; position: absolute; top: 0; left: 0; width: 57mm; } 
      .ticket { position: absolute; top: 0; left: 0; width: 57mm; padding-left: 5mm; margin: 0; } 
    }

    /* Splash Screen */
    #splash-screen { 
        position: fixed; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        background-color: #000; 
        display: flex; 
        flex-direction: column; 
        justify-content: center; 
        align-items: center; 
        z-index: 10000; 
        transition: opacity 0.8s ease, transform 0.8s ease; 
    }
    .splash-logo { width: clamp(120px, 20vw, 180px); margin-bottom: 30px; }
    .splash-title { font-family: 'Kanit', sans-serif; color: white; font-size: clamp(22px, 3vw, 32px); font-weight: 800; margin-bottom: 5px; }
    .splash-status { font-family: 'Sarabun', sans-serif; color: #a0a0a0; font-size: 14px; margin-bottom: 25px; }
    .progress-container { width: min(250px, 70%); height: 6px; background: #1a1a1a; border-radius: 10px; overflow: hidden; }
    
    .progress-fill { 
        width: 0%; 
        height: 100%; 
        background: linear-gradient(90deg, #2196F3, #00BCD4, #2196F3); 
        background-size: 200% 100%;
        animation: flow 2s linear infinite; 
        transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
    }

    @keyframes flow { 
        0% { background-position: 200% 0; } 
        100% { background-position: 0 0; } 
    }

    /* 🏎️ ปรับแต่ง Quick Menu ให้รองรับ 3 คอลัมน์ */
.quick-menu {
  display: grid;
  grid-template-columns: repeat(3, 1fr); /* แบ่ง 3 ส่วนเท่ากัน */
  gap: 10px;
  width: 100%;
  margin-bottom: 25px;
}

.quick-card {
  background: white;
  border: 2px solid #e0e0e0;
  border-radius: 18px;
  padding: 12px 8px;
  display: flex;
  flex-direction: column; /* วางไอคอนบน ข้อความล่าง */
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.03);
  min-height: 120px;
}

.card-icon {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: white;
}

.card-text {
  color: #2d3436;
  font-size: 13px;
  line-height: 1.2;
  text-align: center;
}

.card-text b {
  font-size: 16px;
}

/* --- สีแยกตามประเภท --- */

/* รถยนต์ - สีม่วง */
.card-car { border-color: #dcd6f7; }
.card-car .card-icon { background: #6c5ce7; }
.card-car b { color: #6c5ce7; }

/* มอเตอร์ไซค์ - สีเขียว */
.card-motor { border-color: #c2f0e5; }
.card-motor .card-icon { background: #00b894; }
.card-motor b { color: #00b894; }

/* รถบรรทุก - สีส้ม/เหลือง */
.card-truck { border-color: #ffeaa7; }
.card-truck .card-icon { background: #e17055; }
.card-truck b { color: #e17055; }

/* เอฟเฟกต์เมื่อกด */
.quick-card:active {
  transform: scale(0.92);
  background: #f8f9fa;
}

    /* 🎨 ส่วนที่เพิ่มเติม: ปรับแต่งปุ่ม FAQ ให้รองรับการเลือกอายุใบขับขี่ */
    #faq-container .faq-btn {
      justify-content: flex-start; /* ให้ไอคอน/ข้อความเริ่มจากซ้าย */
      padding-left: clamp(15px, 2vw, 25px); 
      font-weight: 500;
      text-align: left;
      background: #ffffff;
      border: 1px solid #d1d8e0;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      /* ลบ Border เดิมที่เป็นสีม่วงออกเพื่อให้รองรับ Border-left จาก JS */
      border-left: 1px solid #d1d8e0; 
    }

    #faq-container .faq-btn:active {
      background: #f1f2f6;
      transform: scale(0.98) translateX(5px); /* กดแล้วยุบนิดๆ และเลื่อนขวาหน่อยๆ */
    }

    /* ตกแต่งตัวอักษรในปุ่ม FAQ */
    .faq-btn b {
      font-weight: 800;
      color: #2d3436;
    }

</style>
</head>
<body>

  <div id="splash-screen">
    <img src="https://img2.pic.in.th/59424.png" class="splash-logo" alt="Logo">
    <div class="splash-title">น้องนำทาง</div>
    <div id="splash-status-text" class="splash-status">กำลังเริ่มต้นระบบ... (Initializing Database...)</div>
    <div class="progress-container">
        <div id="splash-progress-bar" class="progress-fill"></div>
    </div>
  </div>
  
  <div class="main-container">
    <div class="top-controls">
      <button onclick="toggleMute()" id="muteBtn" class="btn-mute"><i id="muteIcon" class="fas fa-volume-up"></i></button>
      <div class="lang-container">
        <button onclick="changeLang('th')" id="btn-th" class="btn-lang active"><img src="https://flagcdn.com/w40/th.png"> TH</button>
        <button onclick="changeLang('en')" id="btn-en" class="btn-lang"><img src="https://flagcdn.com/w40/us.png"> EN</button>
      </div>
    </div>

    <div class="avatar-container">
      <lottie-player id="lottie-canvas" src="https://lottie.host/568e8594-a319-4491-bf10-a0f5c012fc76/6S3urqybG5.json" background="transparent" speed="1" loop autoplay></lottie-player>
    </div>

    <div class="display-box" id="response-text"></div>

    <div class="faq-title"><i class="fas fa-id-card"></i> ระบบคัดกรองเอกสารต่อใบขับขี่:</div>
    <div class="quick-menu">
      <button class="quick-card card-car" onclick="startLicenseCheck('รถยนต์')">
        <div class="card-icon"><i class="fas fa-car"></i></div>
        <div class="card-text">ใบขับขี่<br><b>รถยนต์</b></div>
      </button>
      
      <button class="quick-card card-motor" onclick="startLicenseCheck('รถจักรยานยนต์')">
        <div class="card-icon"><i class="fas fa-motorcycle"></i></div>
        <div class="card-text">ใบขับขี่<br><b>มอเตอร์ไซค์</b></div>
      </button>

      <button class="quick-card card-truck" onclick="startLicenseCheck('รถบรรทุก/สาธารณะ')">
        <div class="card-icon"><i class="fas fa-truck"></i></div>
        <div class="card-text">ใบขับขี่<br><b>รถบรรทุก</b></div>
      </button>
    </div>
    
    <div class="faq-title" id="faq-title-text"><i class="fas fa-star"></i> คำถามที่พบบ่อย:</div>
    <div id="faq-container" class="faq-grid"></div>

    <div class="input-section">
      <input type="text" id="userInput" placeholder="พิมพ์คำถามที่นี่..." onkeypress="handleKeyPress(event)">
      <button class="btn-send" onclick="handleManualInput()"><i class="fas fa-paper-plane"></i></button>
    </div>
    
    <div class="mic-section">
      <button id="micBtn" class="btn-mic" onclick="toggleListening()"><i class="fas fa-microphone"></i></button>
      <p id="statusText" style="margin-top:10px; color: #636e72; font-size: 14px;">แตะไมค์เพื่อเริ่มพูด</p>
    </div>
</div>

  <div id="ticketLicenseWrapper" style="display: none;">
    <div class="ticket">
      <div style="font-size: 15px; font-weight: bold;">🧾 ใบนำทางติดต่อราชการ</div>
      <div style="font-size: 11px; border-bottom: 1px dashed black; padding-bottom: 5px;">สำนักงานขนส่งอำเภอพยัคฆภูมิพิสัย</div>
      <div class="big" id="printLicenseType">-</div>
      <div id="printLicenseNote">-</div>
      <div style="text-align: left; margin: 10px 0 0 8px; font-size: 12px;">
        <b>เอกสารที่ต้องใช้:</b>
        <div id="printLicenseItems"></div>
      </div>
      <div style="border-top: 1px dashed black; padding-top: 5px; font-size: 10px; text-align: center;">
        <div id="printLicenseTime"></div>
        <div style="font-weight: bold; margin-top: 4px;">*ยื่นใบนี้พร้อมเอกสารที่งานใบอนุญาตขับรถชั้น 2*</div>
      </div>
    </div>
  </div>

  <audio id="queueSound" preload="auto">
    <source src="https://taiyang12300.github.io/sound/ยื่นใบนำทาง.mp3" type="audio/mpeg">
  </audio>
  <video id="video" width="640" height="480" autoplay muted playsinline style="display:none;"></video>
  
  <script src="script.js?v=2.1"></script>

  <script>
    // --- Service Worker ---
    if ('service-worker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('Service Worker registered!'))
          .catch(err => console.log('Registration failed: ', err));
      });
    }

    // --- Core UI Logic ---
    function toggleMute() {
      window.isMuted = !window.isMuted;
      const muteBtn = document.getElementById('muteBtn');
      const muteIcon = document.getElementById('muteIcon');
      if (window.isMuted) {
        window.speechSynthesis.cancel();
        muteBtn.classList.add('muted');
        muteIcon.className = 'fas fa-volume-mute';
      } else {
        muteBtn.classList.remove('muted');
        muteIcon.className = 'fas fa-volume-up';
      }
    }

    function changeLang(lang) {
      window.speechSynthesis.cancel();
      window.isBusy = false;
      window.currentLang = lang;
      window.isMuted = false;
      document.getElementById('btn-th').classList.toggle('active', lang === 'th');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      const isTh = (lang === 'th');
      document.getElementById('userInput').placeholder = isTh ? "พิมพ์คำถามที่นี่..." : "Type your question here...";
      document.getElementById('statusText').innerText = isTh ? "แตะไมค์เพื่อเริ่มพูด" : "Tap mic to speak";
      document.getElementById('response-text').innerText = isTh ? "เปลี่ยนเป็นภาษาไทยแล้วครับ" : "Switched to English.";
      if (window.recognition) window.recognition.lang = isTh ? 'th-TH' : 'en-US';
      if (typeof renderFAQButtons === "function") renderFAQButtons();
    }

    function handleManualInput() {
      const input = document.getElementById('userInput');
      if (input.value.trim()) { processQuery(input.value.trim()); input.value = ''; }
    }
    function handleKeyPress(e) { if (e.key === 'Enter') handleManualInput(); }

    async function processQuery(query) {
      window.speechSynthesis.cancel();
      document.getElementById('response-text').innerText = (window.currentLang === 'th') ? "กำลังค้นหา..." : "Searching...";
      if (typeof getResponse === "function") await getResponse(query);
    }

    // --- Printing System ---
    function printLicenseNote(type, note, items) {
      const now = new Date();
      document.getElementById('printLicenseType').innerText = type;
      document.getElementById('printLicenseNote').innerText = note;
      document.getElementById('printLicenseTime').innerText = `เวลาพิมพ์: ${now.toLocaleString('th-TH')}`;
      const docArray = items.includes('\\n') ? items.split('\\n') : items.split('\n');
      const itemsHTML = docArray
        .filter(i => i.trim() !== "")
        .map(i => `<div style="text-align: left !important; font-weight: 900 !important; color: #000 !important; margin-bottom: 3px;">[ ✓ ] ${i.trim()}</div>`)
        .join('');
      document.getElementById('printLicenseItems').innerHTML = itemsHTML;
      const audio = document.getElementById('queueSound');
      if (audio) { audio.currentTime = 0; audio.play().catch(e => {}); }
      const wrapper = document.getElementById('ticketLicenseWrapper');
      wrapper.style.display = 'block';
      setTimeout(() => {
        window.print();
        setTimeout(() => {
          wrapper.style.display = 'none';
          if(typeof renderFAQButtons === "function") renderFAQButtons(); 
        }, 500);
      }, 300);
    }
  </script>
</body>
</html>
